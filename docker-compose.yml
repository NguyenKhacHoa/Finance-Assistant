version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finance_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2005
      POSTGRES_DB: finance_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: finance_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finance.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - finance_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:2005@db:5432/finance_assistant
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - finance_network
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Trong Docker, React cần trỏ về public IP hoặc domain thực tế của backend
        # Thay đổi localhost thành IP của máy chủ nếu deploy thực tế
        - VITE_API_URL=http://localhost:3000
    container_name: finance_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finance_network

networks:
  finance_network:
    driver: bridge

volumes:
  postgres_data:
